name: nu_results_flutter
description: National University results app built with Flutter for Android.
publish_to: 'none'

version: 1.0.0+2

environment:
  sdk: ">=3.10.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  shared_preferences: ^2.3.2
  webview_flutter: ^4.10.0
  google_mobile_ads: ^2.3.0
  html: ^0.15.6
  http: ^1.6.0
  url_launcher: ^6.3.2
  share_plus: ^6.3.0
  dio: ^5.3.1
  path_provider: ^2.0.14
  flutter_pdfview: ^1.2.7
  open_file: ^3.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.11.0

flutter:
  uses-material-design: true
  assets:
    - assets/app_icon_cropped.png

# Configure flutter_launcher_icons. Place your PNG logo at `assets/app_icon.png`
flutter_icons:
  android: true
  ios: true
  image_path: assets/app_icon_cropped.png
  adaptive_icon_background: assets/app_icon_bg.png
  adaptive_icon_foreground: assets/app_icon_fg.png
