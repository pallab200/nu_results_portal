<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Screenshot template - NU Results Portal</title>
    <style>
      body { margin:0; font-family: Inter, system-ui, Arial; background: #f4f7fb; display:flex; align-items:center; justify-content:center; height:100vh }
      .device { width: 360px; height: 800px; border-radius:28px; box-shadow: 0 20px 50px rgba(16,35,59,0.12); overflow:hidden; background: #fff; position:relative }
      header { padding:18px; background:linear-gradient(90deg,#1565c0,#42a5f5); color:#fff; font-weight:700 }
      .content { padding:20px }
      .card { background:#f8fbff; border-radius:12px; padding:16px; margin-bottom:12px }
      .badge { display:inline-block; background:#eaf4ff; color:#1565c0; padding:6px 10px; border-radius:8px; font-weight:600 }
      .cta { margin-top:16px; display:inline-block; background:#1565c0; color:#fff; padding:10px 16px; border-radius:8px }
      .footer { position:absolute; bottom:12px; left:0; right:0; text-align:center; font-size:12px; color:#667788 }
    </style>
  </head>
  <body>
    <div class="device">
      <div class="header">
        <div style="padding:0 18px; height:64px; display:flex; align-items:center; color:#fff; font-weight:700; background:linear-gradient(90deg,#1565c0,#42a5f5)">NU Results Portal</div>
      </div>
      <div class="content">
        <div class="card"><div class="badge">Search</div><p style="margin:8px 0 0">Enter roll/registration to view official results.</p></div>
        <div class="card"><strong>Result:</strong><div style="margin-top:8px">Roll: 123456 — CGPA: 3.65</div></div>
        <div class="card"><strong>Notice:</strong><div style="margin-top:8px">New exam schedule published — view PDF</div></div>
        <a class="cta">Open PDF</a>
      </div>
      <div class="footer">Tap to view official NU site • Non-personalized ads may appear</div>
    </div>
  </body>
</html>
